<html lang="en">
  <head>
     <title>|Navbar|</title>
     
      <style>
        body {
            margin: 0;
             font-family: Arial, Helvetica, sans-serif;
        }
        .topnav {
            overflow: hidden;
            background-color: rgb(46, 161, 123);
        }
        .topnav a {
            float: left;
            color: aqua;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
            font-size: 17px;
        }
        .topnav a:hover {
            background-color: rgb(68, 111, 221);
            color: rgb(0, 21, 255);
        }
        .topnav a.active {
            background-color: rgb(16, 49, 109);
        }
      </style>
      
  </head>
  <body>
    <div class="topnav">
         <a class:="active" href="#home">Home</a>
         <a href="#">About us!</a>
         <a href="#">Gallery</a>
         <a href="#">Contact us!</a>
    </div>
  </body>
</html>
