<html>
    <body>
        <selection>
            <img class="myslides" src="cat.jpg" alt="this image coudn't be uploaded">
            <img class="myslides" src="car2.jpg" alt="this image coudn't be uploaded">
        </selection>
        <script>
            var myIndex = 0;
            carousel();

            function carousel() {
                var i;
                var x = document.getElementsByClassName("myslides");
                for (i = 0; i < x.length; i++) {
                    x[i].style.display = "none";
                }
                myIndex++;
                if (myIndex > x.length) {myIndex = 1
                x[myIndex-1].style.display = "block"
                setTimeout(carousel, 3000);
                }
            }
        </script>
    </body>
</html>
